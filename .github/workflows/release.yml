name: Release

# Deploys the plugin to the WordPress.org SVN repository on a version tag. Dormant until tagged.
# Requires WPORG_SVN_USERNAME + WPORG_SVN_PASSWORD secrets, and the plugin slug must already be
# approved/hosted on WordPress.org (a one-time manual submission + review).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  deploy-wordpress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: WordPress.org plugin deploy
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: krynox-captcha
